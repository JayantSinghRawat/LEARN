<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Form</title>
</head>
<body>
    <h3>get request form</h3>
    <form method = "get" action = "http://localhost:3000/register">
        <input placeholder = "enter username" name = "username" type = "text" required>
        <input placeholder = "enter password" name = "password" type = "password" required>
        <button type = "submit">Submit</button>
    </form>

    <h3>post request form</h3>
    <form method = "post" action = "http://localhost:3000/register">
        <input placeholder = "enter username" name = "username" type = "text" required>
        <input placeholder = "enter password" name = "password" type = "password" required>
        <button type = "submit">Submit</button>
    </form>
</body>
<script src = "app.js"></script>
</html>
